<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Menú MichesSanfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <header>
        <h1 class="titulo">MichesSanfa</h1>
    </header>

    <nav class="main-nav">
        <button class="nav-btn active" data-category="comida">
            <i class="fa-solid fa-utensils"></i><span>Comida</span>
        </button>
        <button class="nav-btn" data-category="bebidas">
            <i class="fa-solid fa-beer-mug-empty"></i><span>Bebidas</span>
        </button>
        <button class="nav-btn" data-category="cocteleria">
            <i class="fa-solid fa-martini-glass-citrus"></i><span>Coctelería</span>
        </button>
        <button class="nav-btn" data-category="postres">
            <i class="fa-solid fa-ice-cream"></i><span>Postres</span>
        </button>
    </nav>

    <main id="content-area">
        <section id="menu-container"></section>

        <section id="facturacion" class="hidden">
            <div class="form-card">
                <h2>Solicitud de Facturación</h2>
                <p class="form-instruction">Ingresa tus datos fiscales y adjunta los archivos solicitados para generar tu CFDI.</p>
                
                <form id="facturaForm" enctype="multipart/form-data">
                    <div class="input-group">
                        <label for="email"><i class="fa-solid fa-envelope"></i> Correo electrónico:</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="ticket"><i class="fa-solid fa-receipt"></i> Ticket del restaurante:</label>
                        <input type="file" id="ticket" name="ticket" accept=".jpg,.png,.pdf" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="voucher"><i class="fa-solid fa-credit-card"></i> Voucher de pago:</label>
                        <input type="file" id="voucher" name="voucher" accept=".jpg,.png,.pdf" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="constancia"><i class="fa-solid fa-file-invoice"></i> Constancia de Situación Fiscal:</label>
                        <input type="file" id="constancia" name="constancia" accept=".jpg,.png,.pdf" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <i class="fa-solid fa-paper-plane"></i> Enviar Datos de Facturación
                    </button>
                </form>
                <p id="mensaje"></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <span class="facturacion-link" data-category="facturacion">
                <i class="fa-solid fa-file-invoice-dollar"></i> Facturación Electrónica (CFDI)
            </span>
            <p class="copyright">© 2026 Restaurante Michessanfa. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
